# crowdfund.doxaed.com — installed at /etc/nginx/sites-available/crowdfund.doxaed.com
# Rate-limit zones (this file is included inside the http{} context).
limit_req_zone $binary_remote_addr zone=cf_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=cf_strict:10m rate=2r/s;

upstream crowdfund_app {
    server unix:/run/crowdfund/gunicorn.sock fail_timeout=0;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name crowdfund.doxaed.com 98.130.120.70 _;

    server_tokens off;
    client_max_body_size 8m;

    root /home/ubuntu/Crowdfund.doxaed.com/frontend/dist;
    index index.html;

    include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    access_log /var/log/nginx/crowdfund.access.log;
    error_log /var/log/nginx/crowdfund.error.log;

    # Never serve dotfiles.
    location ~ /\. { deny all; }

    # ------------------------------------------------------------- API
    location /api/ {
        limit_req zone=cf_api burst=20 nodelay;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-proxy-params.conf;
    }
    location = /api/auth/login/ {
        limit_req zone=cf_strict burst=6 nodelay;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-proxy-params.conf;
    }
    location = /api/auth/signup/ {
        limit_req zone=cf_strict burst=6 nodelay;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-proxy-params.conf;
    }

    # Django admin (rate-limited, noindex)
    location /django-admin/ {
        limit_req zone=cf_strict burst=10 nodelay;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header X-Robots-Tag "noindex, nofollow" always;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-proxy-params.conf;
    }

    # Campaign share pages: SPA shell with per-campaign OG tags from Django.
    location ^~ /c/ {
        limit_req zone=cf_api burst=20 nodelay;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-proxy-params.conf;
    }

    # ------------------------------------------------------------ media
    # Public: campaign QR codes and covers only.
    location ^~ /media/qr/ {
        alias /home/ubuntu/Crowdfund.doxaed.com/media/qr/;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
    }
    location ^~ /media/covers/ {
        alias /home/ubuntu/Crowdfund.doxaed.com/media/covers/;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
    }
    # Everything else under /media (payment proofs) is private.
    location ^~ /media/ { return 404; }

    # Owner-only payment proofs, released by Django via X-Accel-Redirect.
    location ^~ /_protected_media/ {
        internal;
        alias /home/ubuntu/Crowdfund.doxaed.com/media/;
    }

    # ----------------------------------------------------------- static
    location ^~ /django-static/ {
        alias /home/ubuntu/Crowdfund.doxaed.com/staticfiles/;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /share-default.png {
        alias /home/ubuntu/Crowdfund.doxaed.com/deploy/assets/share-default.png;
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # Vite build outputs hashed filenames — cache hard.
    location ^~ /assets/ {
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location = /index.html {
        include /home/ubuntu/Crowdfund.doxaed.com/deploy/nginx-security-headers.conf;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # SPA fallback
    location / {
        try_files $uri /index.html;
    }
}
